<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analyzer - Wajiha Khan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #60a5fa;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
        }
        textarea {
            width: 100%;
            height: 160px;
            padding: 20px;
            background: #1e2937;
            color: white;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 1.1rem;
            resize: vertical;
        }
        button {
            margin-top: 20px;
            padding: 14px 40px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .result {
            margin-top: 40px;
            padding: 30px;
            background: #1e2937;
            border-radius: 12px;
            border-left: 6px solid #22c55e;
        }
        .positive { border-left-color: #22c55e; }
        .negative { border-left-color: #ef4444; }
        .neutral { border-left-color: #eab308; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Sentiment Analyzer</h1>
        <p class="subtitle">Built by Wajiha Khan • Spring Boot</p>

        <form method="post" action="/analyze">
            <textarea name="text" placeholder="Paste any text (review, tweet, feedback...) here..." required></textarea><br>
            <button type="submit">Analyze Sentiment</button>
        </form>

        <div class="result" th:if="${sentiment}" th:class="${sentiment}">
            <h2 th:text="${sentiment}" style="margin-bottom: 15px;"></h2>
            <p><strong>Confidence:</strong> <span th:text="${confidence}"></span>%</p>
            <p><strong>Analyzed Text:</strong></p>
            <p style="background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 10px;" th:text="${text}"></p>
        </div>
    </div>
</body>
</html>
