<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Engine - Wajiha Khan</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .card {
            width: 850px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(148,163,184,0.2);
        }

        h1 {
            text-align: center;
            color: #60a5fa;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 12px;
            border-left: 6px solid;
            animation: fadeIn 0.5s ease-in-out;
        }

        .positive { border-left-color: #22c55e; }
        .negative { border-left-color: #ef4444; }
        .neutral { border-left-color: #eab308; }

        .label {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .confidence-bar {
            height: 10px;
            background: #1e293b;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: #22c55e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div class="card">

    <h1>🤖 AI Sentiment Engine</h1>
    <p class="subtitle">NLP Inference System • Spring Boot Microservice</p>

    <form method="post" action="/analyze">
        <textarea name="text" placeholder="Enter text (review, tweet, feedback...)" required></textarea>
        <button type="submit">Run Inference</button>
    </form>

    <div th:if="${sentiment}" class="result"
         th:classappend="${sentiment.toLowerCase()}">

        <div class="label" th:text="${sentiment}"></div>

        <p style="margin-top:10px;">
            Confidence: <strong th:text="${confidence}"></strong>
        </p>

        <div class="confidence-bar">
            <div class="fill"
                 th:style="'width:' + ${confidence} + '%'"></div>
        </div>

        <p style="margin-top:15px; color:#94a3b8;">Input Text:</p>
        <p style="background:#0f172a;padding:12px;border-radius:8px;margin-top:8px;"
           th:text="${text}">
        </p>
    </div>

</div>
</body>
</html>
